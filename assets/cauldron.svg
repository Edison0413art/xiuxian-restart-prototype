<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- 丹炉 -->
<!-- smoke -->
<rect x="13" y="2" width="2" height="2" fill="#d4a23a" opacity="0.4"/>
<rect x="16" y="0" width="2" height="3" fill="#f2b544" opacity="0.6"/>
<rect x="18" y="2" width="2" height="2" fill="#d4a23a" opacity="0.4"/>
<!-- lid -->
<rect x="9" y="9" width="14" height="2" fill="#5a3220"/>
<rect x="8" y="11" width="16" height="2" fill="#7a4a30"/>
<!-- knob -->
<rect x="14" y="6" width="4" height="3" fill="#5a3220"/>
<rect x="15" y="4" width="2" height="2" fill="#7a4a30"/>
<!-- body -->
<rect x="7" y="13" width="18" height="10" fill="#8b5a35"/>
<rect x="8" y="13" width="16" height="1" fill="#a87a4a"/>
<rect x="7" y="22" width="18" height="1" fill="#5a3220"/>
<!-- 太极 inscription -->
<circle cx="16" cy="18" r="3" fill="#d4a23a"/>
<rect x="15" y="17" width="2" height="2" fill="#8b5a35"/>
<!-- 3 legs -->
<rect x="8" y="23" width="2" height="4" fill="#3a200f"/>
<rect x="15" y="23" width="2" height="5" fill="#3a200f"/>
<rect x="22" y="23" width="2" height="4" fill="#3a200f"/>
<!-- glow -->
<rect x="14" y="15" width="4" height="1" fill="#f2b544" opacity="0.5"/>
</svg>
